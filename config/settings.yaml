# NEXUS Bot - Configuration Settings
# Last Updated: April 2026

# ==========================================
# TRADING PARAMETERS
# ==========================================
trading:
  # Trading mode: 'paper' or 'live'
  mode: 'paper'
  
  # Universe selection
  universe:
    top_coins: 15                    # Top N coins by volume
    min_volume_usd: 50000000        # Minimum 24h volume ($50M)
    update_interval_hours: 24       # Update universe daily
  
  # Position management
  position:
    max_positions: 1                # Max concurrent positions
    leverage: 5                     # Isolated leverage (5x)
    margin_percent: 8               # Position size (8% of balance)
  
  # Risk management
  risk:
    daily_loss_limit_percent: -3   # Circuit breaker (-3%)
    max_trades_per_day: null       # No limit (null)
    
  # Paper trading
  paper_trading:
    initial_balance: 10000          # Virtual balance ($10,000)
    

# ==========================================
# SCORING SYSTEM
# ==========================================
scoring:
  # Minimum score to trade
  min_entry_score: 55               # Score >= 55 required
  
  # Score thresholds
  thresholds:
    premium: 85                     # PREMIUM setup (≥85)
    valid: 70                       # VALID setup (70-84)
    weak: 55                        # WEAK setup (55-69)
    no_trade: 0                     # NO TRADE (<55)
  
  # Initial weights (will be optimized)
  initial_weights:
    tier_0:                         # Structure + Volume (max 50 points)
      consolidation_quality: 15
      volume_spike: 15
      liquidity: 10
      range_duration: 10
      
    tier_1:                         # Primary signals (max 35 points)
      fvg_present: 8
      htf_alignment: 7
      premium_discount: 7
      order_block: 7
      momentum: 6
      
    tier_2:                         # Confirmation (max 15 points)
      candlestick_pattern: 5
      ma_alignment: 5
      fibonacci: 5


# ==========================================
# INDICATOR SETTINGS
# ==========================================
indicators:
  # Timeframes
  timeframes:
    primary: '15m'                  # Main TF (M15)
    confirmation: '30m'             # Confirmation TF (M30)
    higher: '1h'                    # Higher TF (H1)
  
  # Consolidation detection
  consolidation:
    min_duration_candles: 16        # Minimum 4 hours (16x 15min)
    atr_multiplier: 1.5             # Range = 1.5x ATR
    
  # Breakout detection
  breakout:
    volume_multiplier: 2.0          # Volume ≥ 2x average
    close_confirmation: true        # Require candle close
    
  # Premium/Discount zones
  zones:
    premium_threshold: 0.618        # Above 61.8% = premium
    discount_threshold: 0.382       # Below 38.2% = discount


# ==========================================
# POSITION MANAGEMENT
# ==========================================
position_management:
  # Stop Loss
  stop_loss:
    method: 'range_based'           # SL at range low/high
    buffer_percent: 0.5             # 0.5% buffer
  
  # Take Profit
  take_profit:
    method: 'risk_reward'           # Based on R:R
    risk_reward_ratio: 2.0          # Default 2:1 R:R
  
  # Breakeven & Trailing
  breakeven:
    trigger_percent: 2.0            # Lock BE at +2% profit
    
  trailing_stop:
    trigger_percent: 3.0            # Start trailing at +3%
    trail_percent: 1.5              # Trail 1.5% behind
    
  # Max hold time
  max_hold_hours: 24                # Force close after 24h


# ==========================================
# OPTIMIZATION SETTINGS
# ==========================================
optimization:
  # Training parameters
  training:
    min_trades_per_category: 30     # Min 30 trades to optimize
    training_period_months: 3       # 2-3 months training
    
  # Optimization schedule
  schedule:
    frequency: 'monthly'            # Run monthly
    day_of_month: 1                 # 1st day of month
    review_period_days: 7           # 7-day review window
    auto_deploy_after_days: 7       # Deploy if no manual review
    
  # Weight adjustment limits
  limits:
    max_weight_change_percent: 10   # Max 10% change per cycle
    min_weight: 0                   # Minimum weight = 0
    max_weight_tier_0: 50           # Tier 0 max = 50
    max_weight_tier_1: 35           # Tier 1 max = 35
    max_weight_tier_2: 15           # Tier 2 max = 15


# ==========================================
# DATA & LOGGING
# ==========================================
data:
  # Database
  database:
    type: 'sqlite'
    path: 'database/trades.db'
    backup_interval_days: 7
  
  # Historical data
  candle_storage:
    path: 'data/candles/'
    retention_days: 90              # Keep 90 days
  
  # Logging
  logging:
    level: 'INFO'                   # DEBUG, INFO, WARNING, ERROR
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    files:
      main: 'logs/bot.log'
      trades: 'logs/trades.log'
      errors: 'logs/errors.log'


# ==========================================
# BINANCE API SETTINGS
# ==========================================
binance:
  # API endpoints
  api:
    testnet: false                  # Use mainnet
    timeout: 30                     # Request timeout (seconds)
    
  # WebSocket
  websocket:
    reconnect_attempts: 5
    reconnect_delay_seconds: 5
    ping_interval_seconds: 30
    
  # Rate limits (conservative)
  rate_limits:
    requests_per_minute: 1000
    orders_per_second: 5