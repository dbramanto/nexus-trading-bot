binance:
  api:
    testnet: false
    timeout: 30
  rate_limits:
    orders_per_second: 5
    requests_per_minute: 1000
  websocket:
    ping_interval_seconds: 30
    reconnect_attempts: 5
    reconnect_delay_seconds: 5
data:
  candle_storage:
    path: data/candles/
    retention_days: 90
  database:
    backup_interval_days: 7
    path: database/trades.db
    type: sqlite
  logging:
    files:
      errors: logs/errors.log
      main: logs/bot.log
      trades: logs/trades.log
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    level: INFO
indicators:
  breakout:
    close_confirmation: true
    volume_multiplier: 2.0
  consolidation:
    atr_multiplier: 1.5
    min_duration_candles: 16
  timeframes:
    confirmation: 30m
    higher: 1h
    primary: 15m
  zones:
    discount_threshold: 0.382
    premium_threshold: 0.618
initial_balance: 1000
max_positions: 1
mode: paper_trading
optimization:
  limits:
    max_weight_change_percent: 10
    max_weight_tier_0: 50
    max_weight_tier_1: 35
    max_weight_tier_2: 15
    min_weight: 0
  schedule:
    auto_deploy_after_days: 7
    day_of_month: 1
    frequency: monthly
    review_period_days: 7
  training:
    min_trades_per_category: 30
    training_period_months: 3
position_management:
  breakeven:
    trigger_percent: 2.0
  max_hold_hours: 24
  stop_loss:
    buffer_percent: 0.5
    method: range_based
  take_profit:
    method: risk_reward
    risk_reward_ratio: 2.0
  trailing_stop:
    trail_percent: 1.5
    trigger_percent: 3.0
risk_per_trade_percent: 2.5
max_consecutive_losses: 4
scoring:
  initial_weights:
    tier_0:
      consolidation_quality: 15
      liquidity: 10
      range_duration: 10
      volume_spike: 15
    tier_1:
      fvg_present: 8
      htf_alignment: 7
      momentum: 6
      order_block: 7
      premium_discount: 7
    tier_2:
      candlestick_pattern: 5
      fibonacci: 5
      ma_alignment: 5
  min_entry_score: 55
  thresholds:
    no_trade: 0
    premium: 85
    valid: 70
    weak: 55
trading:
  mode: paper
  paper_trading:
    initial_balance: 1000
  position:
    max_positions: 1
  risk:
    max_trades_per_day: null
  universe:
    min_volume_usd: 50000000
    top_coins: 15
    update_interval_hours: 24
