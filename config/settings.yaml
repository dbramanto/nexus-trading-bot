scoring:
  min_entry_score: 55
  thresholds:
    premium: 80
    valid: 50
    weak: 35
    no_trade: 0

risk_per_trade_percent: 2.5
max_consecutive_losses: 4
max_positions: 1
initial_balance: 1000

position_management:
  stop_loss:
    method: range_based
    buffer_percent: 0.5
  take_profit:
    method: risk_reward
    risk_reward_ratio: 2.0
  trailing_stop:
    trigger_percent: 3.0
    trail_percent: 1.5
  breakeven:
    trigger_percent: 2.0

indicators:
  timeframes:
    primary: 15m
    confirmation: 30m
    higher: 1h
  consolidation:
    min_duration_candles: 16
    atr_multiplier: 1.5
  breakout:
    volume_multiplier: 2.0
    close_confirmation: true
  zones:
    premium_threshold: 0.618
    discount_threshold: 0.382

mode: paper_trading
trading:
  mode: paper
  paper_trading:
    initial_balance: 1000
  universe:
    top_coins: 15
    min_volume_usd: 50000000
    update_interval_hours: 24
  position:
    max_positions: 1

binance:
  api:
    testnet: false
    timeout: 30

data:
  logging:
    level: INFO
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    files:
      main: logs/bot.log
      trades: logs/trades.log
      errors: logs/errors.log
